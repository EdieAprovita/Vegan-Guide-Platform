name: CI

# Triggers:
# - Every PR targeting main (feature branches, fix branches, etc.)
# - Direct pushes to main (post-merge verification)
on:
  pull_request:
    branches: ["main"]
  push:
    branches: ["main"]

# Cancel in-flight runs for the same PR/branch to save runner minutes.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ─────────────────────────────────────────────
  # JOB 1 — Quality checks (fast, fully parallel)
  # Lint, type-check, formatting, and dependency audit.
  # All gates are blocking except the npm audit summary,
  # which is informational at the "moderate" level but
  # blocks on "high" and above.
  # ─────────────────────────────────────────────
  quality:
    name: Quality Checks
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      # --prefer-offline speeds up installs on cache hits.
      - name: Install dependencies
        run: npm ci --prefer-offline

      # ESLint: --max-warnings=0 is already in the lint script.
      - name: Lint
        run: npm run lint

      # tsc --noEmit: catches type errors without emitting JS.
      - name: Type Check
        run: npm run type-check

      # Prettier: formatting is a blocking quality gate.
      - name: Format Check
        run: npm run format:check

      # Security audit — block on high/critical vulnerabilities.
      # "moderate" and below are reported but do not fail the job.
      # Rationale: moderate findings often require upstream fixes and
      # should not block all merges indefinitely.
      - name: Security Audit (high+)
        run: npm audit --audit-level=high

  # ─────────────────────────────────────────────
  # JOB 2 — Unit tests + coverage gate
  # Runs after quality to avoid wasting test time on broken code.
  # Coverage thresholds are defined in jest.config.js
  # (branches: 20, functions: 21, lines: 23, statements: 23).
  # This job is fully blocking — a coverage regression fails the PR.
  # ─────────────────────────────────────────────
  test:
    name: Unit Tests & Coverage
    runs-on: ubuntu-latest
    needs: [quality]

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci --prefer-offline

      # Run tests with coverage enforcement. Jest reads thresholds from
      # jest.config.js. --runInBand forces serial execution on CI to
      # prevent memory exhaustion from concurrent jsdom environments.
      # NOTE: --coverage=false override from the old pipeline is removed.
      # Tests and coverage now run in a single pass.
      - name: Run Tests with Coverage Gate
        run: npm run test:coverage -- --runInBand --ci

      # Upload the coverage report as an artifact for review in the
      # GitHub Actions UI without needing a third-party service.
      - name: Upload Coverage Report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: coverage/
          retention-days: 7

  # ─────────────────────────────────────────────
  # JOB 3 — Production build verification
  # Runs after quality to catch build-time errors (missing env vars
  # with defaults, invalid imports, broken RSC boundaries, etc.)
  # before the code reaches Vercel. This is the most critical gate
  # that was missing from the original pipeline.
  # ─────────────────────────────────────────────
  build:
    name: Production Build
    runs-on: ubuntu-latest
    needs: [quality]

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci --prefer-offline

      # NEXT_PUBLIC_* vars must be present at build time for Next.js to
      # inline them. We provide placeholder values so the build succeeds
      # in CI without real infrastructure. Runtime behaviour is tested
      # separately in E2E with mocked responses.
      - name: Build Next.js application
        run: npm run build
        env:
          # Suppress Next.js telemetry in CI.
          NEXT_TELEMETRY_DISABLED: 1
          # Placeholder values satisfy Next.js env validation at build time.
          # AUTH_SECRET must match the value used in the E2E job so session
          # tokens signed during tests are verifiable by the running server.
          AUTH_URL: http://localhost:3000
          AUTH_SECRET: ci-placeholder-secret-not-used-in-production
          NEXTAUTH_URL: http://localhost:3000
          NEXTAUTH_SECRET: ci-placeholder-secret-not-used-in-production
          # IMPORTANT: must be localhost:3000 (same origin as the Next.js server)
          # so that NEXT_PUBLIC_API_URL is inlined into the bundle pointing at
          # localhost:3000/api/v1. Playwright's page.route("**/api/v1/**") only
          # intercepts same-origin requests — cross-origin calls to any other
          # host bypass the interceptor entirely and cause 503 in tests.
          NEXT_PUBLIC_API_URL: http://localhost:3000/api/v1

      # Upload the .next build output so the E2E job can reuse it
      # without rebuilding (saves ~60-90s per run).
      # include-hidden-files: true is required because .next/ starts with a
      # dot and upload-artifact@v4 skips hidden paths by default.
      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: nextjs-build
          path: .next/
          retention-days: 1
          include-hidden-files: true

  # ─────────────────────────────────────────────
  # JOB 4 — E2E tests (Playwright / Chromium)
  # Runs only on PRs to main — not on direct pushes — because
  # E2E suites are slow (~3-5 min) and post-merge runs on main
  # are already covered by Vercel's preview deployments.
  #
  # Self-contained: installs deps, starts the Next.js dev server
  # via playwright.config.ts webServer, and runs Chromium tests.
  # No artifact download needed — playwright.config.ts uses
  # "npm run dev" unconditionally, so downloading a production
  # build would be unused. If the suite is later migrated to
  # "npm start" (production server), restore the needs: [build]
  # dependency and the download-artifact step at that time.
  #
  # continue-on-error: true during initial rollout so that
  # flaky/incomplete specs do not block merges while the suite
  # is being stabilised. Change to false once the suite is green
  # for 5+ consecutive runs.
  # ─────────────────────────────────────────────
  e2e:
    name: E2E Tests (Chromium)
    runs-on: ubuntu-latest
    # Depend on build so the .next/ artifact is available for "npm start".
    # The build job already depends on quality, so the quality gate is still
    # enforced transitively. Wall time is not materially affected because the
    # build job finishes in ~90s, well before Playwright browser install completes.
    needs: [build]
    # Run E2E only on pull requests (not on push to main).
    if: github.event_name == 'pull_request'
    # Hard ceiling: 351 tests at workers=2 complete in ~12 minutes, plus
    # ~5 min CI overhead (npm ci, artifact download, Playwright install,
    # server cold-start). 30 minutes gives a comfortable margin without
    # letting a hung job consume the full 6-hour GitHub default.
    timeout-minutes: 30
    # Remove this once the E2E suite is consistently green.
    continue-on-error: true

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci --prefer-offline

      # Download the pre-built .next/ artifact from the build job.
      # This allows "npm start" (production server) to run without rebuilding,
      # saving ~90s and eliminating the HMR WebSocket that caused networkidle
      # to time out on every test.
      - name: Download build artifact
        uses: actions/download-artifact@v4
        with:
          name: nextjs-build
          path: .next/

      # Install only the Chromium browser and its system dependencies.
      # Skipping Firefox/WebKit keeps install time under 30s.
      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      # playwright.config.ts webServer starts "npm start" in CI automatically.
      # workers=1 and retries=2 are applied when CI=true (set by runner).
      - name: Run E2E tests
        run: npx playwright test --project=chromium
        env:
          NEXT_TELEMETRY_DISABLED: 1
          # AUTH_URL is the Auth.js v5 canonical env var (replaces NEXTAUTH_URL).
          # Both are set for compatibility with any v4 paths still in the bundle.
          AUTH_URL: http://localhost:3000
          NEXTAUTH_URL: http://localhost:3000
          # AUTH_SECRET / NEXTAUTH_SECRET must match the value used at build time
          # (baked into the .next/ artifact by the build job).
          AUTH_SECRET: ci-placeholder-secret-not-used-in-production
          NEXTAUTH_SECRET: ci-placeholder-secret-not-used-in-production
          # Must match the value baked into the bundle by the build job.
          # page.route() intercepts localhost:3000 requests; any other host escapes.
          NEXT_PUBLIC_API_URL: http://localhost:3000/api/v1
          CI: true

      # Always upload traces/screenshots so failures are debuggable
      # even when continue-on-error swallows the exit code.
      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: |
            playwright-report/
            e2e-results.xml
          retention-days: 7
