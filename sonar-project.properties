sonar.projectKey=EdieAprovita_Vegan-Guide-Platform
sonar.projectName=Vegan Guide Platform
sonar.projectVersion=1.0.0

# Sources
sonar.sources=src
sonar.tests=src/__tests__
sonar.test.inclusions=**/*.test.ts,**/*.test.tsx

# Exclusions
sonar.exclusions=node_modules/**,dist/**,build/**,.next/**
sonar.coverage.exclusions=**/*.d.ts,**/*.test.ts,**/*.test.tsx

# Code smells & duplications
sonar.cpd.exclusions=src/__tests__/**
sonar.duplication.limit=6

# Organization
sonar.organization=edieaprovita

# Language
sonar.language=ts
sonar.sourceEncoding=UTF-8
