sonar.projectKey=EdieAprovita_Vegan-Guide-Platform
sonar.projectName=Vegan Guide Platform
sonar.projectVersion=1.0.0

# Sources
sonar.sources=src
sonar.tests=src/__tests__
sonar.test.inclusions=**/*.test.ts,**/*.test.tsx

# Exclusions from analysis
sonar.exclusions=node_modules/**,dist/**,build/**,.next/**,e2e/**,src/test-utils/**,src/__tests__/**

# Exclusions from coverage
sonar.coverage.exclusions=**/*.d.ts,**/*.test.ts,**/*.test.tsx

# Exclusions from duplication detection (CPD = Copy-Paste Detector)
# Exclude tests (inherently repetitive) and translation files (structural duplication)
sonar.cpd.exclusions=src/__tests__/**,src/test-utils/**,src/lib/i18n/translations.ts

# Organization
sonar.organization=edieaprovita

# Language & Encoding
sonar.sourceEncoding=UTF-8
